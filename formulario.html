<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uro Vaginal Probiotic | Salud y Confianza</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-premium: #d4a5a5; /* Un tono elegante inspirado en el envase */
            --negro-absoluto: #050505;
            --dorado-brillo: rgba(212, 175, 55, 0.4);
            --vidrio: rgba(15, 15, 15, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--negro-absoluto);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- FONDO --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1550524514-9636edba3118?auto=format&fit=crop&q=80'); /* Fondo sutil de flores/bienestar */
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: -1;
        }

        .container { width: 94%; max-width: 1100px; margin: auto; }

        /* --- HEADER --- */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 10vw, 4.5rem);
            letter-spacing: 5px;
            color: var(--rosa-premium);
            text-shadow: 0 0 20px rgba(212, 165, 165, 0.3);
            margin-bottom: 5px;
        }

        .scroll-arrow {
            position: absolute;
            bottom: 30px;
            font-size: 2rem;
            color: var(--rosa-premium);
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        /* --- TARJETA PRINCIPAL --- */
        .main-card {
            background: var(--vidrio);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 25px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 80px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        @media (min-width: 900px) {
            .main-card { display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 50px; }
        }

        /* --- CARRUSEL --- */
        .carousel-box {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: 0.8s ease-in-out;
            filter: drop-shadow(0 0 20px rgba(212, 165, 165, 0.4));
        }

        .slide.active { opacity: 1; transform: scale(1.05); }

        /* --- FORMULARIO --- */
        .form-box h2 { 
            font-family: 'Cinzel'; 
            margin-bottom: 20px; 
            font-size: 1.6rem; 
            text-align: center;
            color: var(--rosa-premium);
        }

        .input-group { margin-bottom: 15px; width: 100%; text-align: left; }
        
        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Montserrat';
        }

        .input-group input:focus { border-color: var(--rosa-premium); outline: none; }

        .btn-confirm {
            width: 100%;
            padding: 22px;
            background: linear-gradient(90deg, #845c5c, #d4a5a5);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(212, 165, 165, 0.2);
        }

        .badge-co {
            text-align: center;
            background: rgba(212,165,165,0.1);
            border: 1px dashed var(--rosa-premium);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.8rem;
            color: #fff;
            font-weight: 900;
        }

        footer { padding: 40px; text-align: center; opacity: 0.4; font-size: 0.7rem; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <div class="container reveal">
            <h1 class="hero-title">URO VAGINAL</h1>
            <p style="letter-spacing: 6px; color: #888; font-size: 0.75rem; font-weight: 900;">BIENESTAR Y EQUILIBRIO PROBIÓTICO</p>
        </div>
        <div class="scroll-arrow" onclick="document.getElementById('pedido').scrollIntoView({behavior: 'smooth'})">↓</div>
    </header>

    <div class="container" id="pedido">
        <main class="main-card reveal">
            <div class="carousel-box">
                <img src="PROBIOTICO_FRONTAL.jpg" class="slide active" alt="Uro Vaginal Probiotic">
                <img src="PROBIOTICO_DETALLE.jpg" class="slide" alt="Beneficios">
            </div>

            <div class="form-box">
                <div class="badge-co">🇨🇴 ENVÍO GRATIS Y PAGO CONTRA ENTREGA</div>
                <h2>SOLICITAR AHORA</h2>
                
                <form id="checkoutForm">
                    <div class="input-group">
                        <label>Nombre y Apellido</label>
                        <input type="text" id="nombre" placeholder="Tu nombre completo" required>
                    </div>

                    <div class="input-group">
                        <label>Celular</label>
                        <input type="tel" id="tel" placeholder="Número de contacto" required>
                    </div>

                    <div class="input-group">
                        <label>Ciudad / Municipio</label>
                        <input type="text" id="ciudad" placeholder="Ciudad de entrega" required>
                    </div>

                    <div class="input-group">
                        <label>Dirección Completa</label>
                        <input type="text" id="dir" placeholder="Calle, Barrio, Casa/Apto" required>
                    </div>

                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Para seguimiento" required>
                    </div>

                    <button type="submit" class="btn-confirm">CONFIRMAR PEDIDO 🔥</button>
                </form>
            </div>
        </main>
    </div>

    <footer>&copy; 2026 URO VAGINAL PROBIOTIC. <br> CUIDADO ÍNTIMO FEMENINO.</footer>

    <script>
        // Revelar al hacer scroll
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                var elementTop = el.getBoundingClientRect().top;
                if (elementTop < window.innerHeight - 100) el.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;

        // Carrusel
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 3500);

        // --- ENVÍO A WHATSAPP (CORREGIDO Y SEGURO) ---
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const n = document.getElementById('nombre').value.trim();
            const t = document.getElementById('tel').value.trim();
            const c = document.getElementById('ciudad').value.trim();
            const d = document.getElementById('dir').value.trim();
            const m = document.getElementById('email').value.trim();

            // Construcción del mensaje robusta
            let msg = "*NUEVA ORDEN: URO VAGINAL PROBIOTIC*\n\n";
            msg += "👤 *Cliente:* " + n + "\n";
            msg += "📱 *Celular:* " + t + "\n";
            msg += "📧 *Email:* " + m + "\n";
            msg += "📍 *Ciudad:* " + c + "\n";
            msg += "🏠 *Dirección:* " + d + "\n";
            msg += "🚚 *Envío:* Pago Contra Entrega";

            // encodeURIComponent asegura que la dirección NO se corte con símbolos como #
            const textoFinal = encodeURIComponent(msg);
            
            window.location.href = "https://wa.me/573026204874?text=" + textoFinal; 
        });
    </script>
</body>
</html>
